name: run-bot

on:
  workflow_dispatch:

jobs:
  run:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: install
      run: pip install pandas requests

    - name: run
      run: python bot.py
